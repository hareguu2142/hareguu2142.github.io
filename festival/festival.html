<!DOCTYPE html>
<html>
<head>
<style>
/* 메뉴바 스타일 */
#menuBar {
  width: 100%;
  background: #ad5c5c;
  overflow: auto;
}

/* 메뉴 아이템 스타일 */
.menuItem {
  float: left;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
  color: white;
  background-color: #333;
}

.menuItem:hover {
  background-color: #ddd;
  color: black;
}

/* 내용 창 스타일 */
#content {
  padding: 20px;
  background-color: #f1f1f1;
}
</style>
</head>
<body onload="loadContent('home.html')">

<div id="menuBar">
  <a href="#" class="menuItem" onclick="loadContent('home.html'); return false;">홈</a>
  <a href="Reveal%20the%20Image/Reveal%20the%20Image.html" target="_blank" class="menuItem">그림 추측</a>
</div>

<div id="content">
</div>

<script>
function loadContent(fileName) {
  var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
      document.getElementById("content").innerHTML = this.responseText;
    }
  };
  xhttp.open("GET", fileName, true);
  xhttp.send();
}
</script>

</body>
</html>
